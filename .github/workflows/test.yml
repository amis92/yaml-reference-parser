name: Test

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        - macOS-latest

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with: {node-version: 22}
    - uses: actions/setup-dotnet@v5
      with: {dotnet-version: '10.0.x'}

    - name: macOS deps
      if: ${{ matrix.os == 'macOS-latest' }}
      run: |
        brew install cpanm
        sudo cpanm -n boolean XXX YAML::PP

    - name: Fetch branches
      run: |
        git config remote.origin.fetch +refs/heads/*:refs/remotes/origin/*
        git fetch --unshallow || true
        # Fetch dependency branches from upstream if missing in fork
        upstream=https://github.com/yaml/yaml-reference-parser
        for branch in node_modules ext-perl; do
          if ! git rev-parse --verify origin/$branch >/dev/null 2>&1; then
            git fetch "$upstream" $branch:refs/remotes/origin/$branch
          fi
        done

    - run: make test
